<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Management Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>📚 Library</h1>
        <nav>
          <button class="nav-btn active" data-target="books">Libra</button>
          <button class="nav-btn" data-target="students">Nxënësit</button>
          <button class="nav-btn" data-target="borrowings">Huazime</button>
        </nav>
      </aside>

      <main class="main-content">
        <header class="top-header">
          <h2 id="section-title">Book Management</h2>
          <p>Manage books, students, and borrowings in one place.</p>
        </header>

        <section id="books" class="panel active">
          <div class="section-header">
            <h3>Books</h3>
            <input id="book-search" type="text" placeholder="Search books by title or author..." />
          </div>

          <form id="book-form" class="grid-form">
            <input type="hidden" id="book-id" />
            <input id="book-title" type="text" placeholder="Title" required />
            <input id="book-author" type="text" placeholder="Author" required />
            <input id="book-year" type="number" placeholder="Year" min="0" required />
            <button type="submit">Save Book</button>
          </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Title</th>
                  <th>Author</th>
                  <th>Year</th>
                  <th>Status</th>
                  <th>Borrow</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="books-table"></tbody>
            </table>
          </div>
        </section>

        <section id="students" class="panel">
          <h3>Students</h3>
          <form id="student-form" class="grid-form">
            <input type="hidden" id="student-id" />
            <input id="student-name" type="text" placeholder="Name" required />
            <input id="student-class" type="text" placeholder="Class" required />
            <button type="submit">Save Student</button>
          </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Class</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="students-table"></tbody>
            </table>
          </div>
        </section>

        <section id="borrowings" class="panel">
          <h3>Borrowings</h3>
          <form id="borrowing-form" class="grid-form">
            <select id="borrow-book" required></select>
            <select id="borrow-student" required></select>
            <input id="borrow-date" type="date" required />
            <button id="borrow-submit" type="submit">Borrow Book</button>
          </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Book</th>
                  <th>Student</th>
                  <th>Borrow Date</th>
                  <th>Return Date</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="borrowings-table"></tbody>
            </table>
          </div>
        </section>

        <p id="message" class="message"></p>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
